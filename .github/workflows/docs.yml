name: documentation

on:
  push:
    paths:
      - "docs/**"
      - "src/**"
      - "setup.cfg"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "setup.cfg"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install -r docs/requirements.txt

      - name: Build docs
        working-directory: ./docs
        run: make html